name: Debug Actions

on:
  workflow_dispatch:
    inputs:
      note:
        description: "Optional note"
        required: false
        default: "manual debug run"

permissions:
  contents: read

jobs:
  debug:
    name: Debug runner + context
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Print event context
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "ref=${{ github.ref }}"
          echo "ref_name=${{ github.ref_name }}"
          echo "sha=${{ github.sha }}"
          echo "actor=${{ github.actor }}"
          echo "repository=${{ github.repository }}"
          echo "workflow=${{ github.workflow }}"
          echo "run_id=${{ github.run_id }}"
          echo "note=${{ inputs.note }}"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Show workspace files
        run: |
          pwd
          ls -la
          ls -la .github/workflows || true

      - name: Validate shell + network basics
        run: |
          uname -a
          git --version
          curl -I https://github.com

      - name: Done
        run: echo "Debug workflow ran successfully."