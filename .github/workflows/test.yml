name: nf-ga4gh CI (test)
on:
  push:

jobs:
  build:
    name: Build nf-ga4gh (NXF_VER=${{ matrix.nextflow_version }})
    if: "!contains(github.event.head_commit.message, '[ci skip]')"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        nextflow_version: ['v24.10.8', 'v25.10.4', 'v26.02.0-edge']
        java_version: [11, 17, 21]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: true

      - name: Setup Java ${{ matrix.java_version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{matrix.java_version}}
          architecture: x64
          distribution: 'temurin'

      - name: Build and test with NXF_VER=${{ matrix.nextflow_version }}
        run: |
          export NXF_VER=${{ matrix.nextflow_version }}
          make clean
          make assemble
          make test
        env:
          GRADLE_OPTS: '-Dorg.gradle.daemon=false'
          NXF_VER: ${{ matrix.nextflow_version }}

