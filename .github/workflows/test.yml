name: nf-ga4gh CI (test)
on:
  push:

jobs:
  test:
    name: NXF ${{ matrix.nextflow_version }} / Java ${{ matrix.java_version }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        nextflow_version: [
            '24.10.8', 
            '25.10.4', 
            '26.02.0-edge'
        ]
        java_version: [
            11,
            17,
            21
        ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: true

      - name: Setup Java ${{ matrix.java_version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java_version }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: Build and Test
        run: |
          make clean
          make assemble
          make test
        env:
          NXF_VER: ${{ matrix.nextflow_version }}
          GRADLE_OPTS: '-Dorg.gradle.daemon=false'
